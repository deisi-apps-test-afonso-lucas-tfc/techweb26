services:
  web:
    build: .
    container_name: django-web
    command: gunicorn project.wsgi:application --bind 0.0.0.0:3000
    env_file:
      - .env
    volumes:
      - db_data:/data
    ports:
      - "3000:3000"
    depends_on:
      - redis

  redis:
    image: redis:7.0
    container_name: redis
    ports:
      - "6379:6379"

  celery:
    build: .
    container_name: celery-worker
    command: ["./wait-for-redis.sh", "celery", "-A", "project", "worker", "--loglevel=info"]
    env_file:
      - .env
    volumes:
      - db_data:/data
      - .:/app
    depends_on:
      - redis

  celery-beat:
    build: .
    container_name: celery-beat
    command: ["./wait-for-redis.sh", "celery", "-A", "project", "beat", "--loglevel=info"]
    env_file:
      - .env
    volumes:
      - db_data:/data
      - .:/app
    depends_on:
      - redis
    restart: always

volumes:
  db_data: