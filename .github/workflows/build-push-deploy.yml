
name: Build, Push, and Deploy Django App

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  STUDENT_ID: ${{ github.event.repository.name }}
  REPOSITORY: pw-2425-alunos

jobs:
  build-and-push:
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ghcr.io/${{ env.REPOSITORY }}/${{ env.STUDENT_ID }}:latest

  deploy:
    runs-on: self-hosted
    needs: build-and-push

    steps:
      - name: Deploy to Server over SSH
        uses: appleboy/ssh-action@v0.1.15
        with:
          host: ${{ secrets.VM_IP }}
          username: ${{ secrets.VM_USER }}
          password: ${{ secrets.VM_PASSWORD }}
          port: ${{ secrets.VM_PORT }}

          script: |
            STUDENT_ID="${{ github.event.repository.name }}"
            REPOSITORY="pw-2425-alunos"

            echo "Using STUDENT_ID=$STUDENT_ID"
            echo "Using REPOSITORY=$REPOSITORY"

            echo "Logging into GHCR..."
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

            echo "Pulling latest Docker image..."
            docker pull ghcr.io/${REPOSITORY}/${STUDENT_ID}:latest

            echo "Stopping old container (if exists)..."
            docker stop "${STUDENT_ID}" || true
            docker rm "${STUDENT_ID}" || true

            echo "Starting new container with persistent SQLite..."

            docker volume rm "${STUDENT_ID}_sqlite" || true

            docker run -d \
              --name "${STUDENT_ID}" \
              --network vm-pw_pw-network \
              --expose 3000 \
              -v "${STUDENT_ID}_sqlite:/data" \
              -v "${STUDENT_ID}_media:/app/media" \
              -e SQLITE_PATH=/data/db.sqlite3 \
              -e DEBUG="${{ secrets.DEBUG }}" \
              -e SECRET_KEY="${{ secrets.SECRET_KEY }}" \
              -e SITE_URL="${{ secrets.SITE_URL }}" \
              -e SITE_DOMAIN="${{ secrets.SITE_DOMAIN }}" \
              -e EMAIL_HOST="${{ secrets.EMAIL_HOST }}" \
              -e EMAIL_PORT="${{ secrets.EMAIL_PORT }}" \
              -e EMAIL_USE_TLS="${{ secrets.EMAIL_USE_TLS }}" \
              -e EMAIL_HOST_USER="${{ secrets.EMAIL_HOST_USER }}" \
              -e EMAIL_HOST_PASSWORD="${{ secrets.EMAIL_HOST_PASSWORD }}" \
              ghcr.io/${REPOSITORY}/${STUDENT_ID}:latest

            echo "Waiting for container to start..."
            sleep 15

            docker logs "${STUDENT_ID}"
