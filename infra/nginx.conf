server {
    listen 80;
    server_name tecweb.ulusofona.pt;

    location = /favicon.ico { access_log off; log_not_found off; }
    location /static/ {
        root /home/arroz/tecweb;
    }

    location /media/ {
        root /home/arroz/tecweb;
        try_files $uri =404;
    }

    location / {
        include proxy_params;
        proxy_pass http://unix:/run/gunicorn.sock;
    }
}